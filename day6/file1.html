<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Records</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="text-center mb-4">Student Records</h2>

    <input type="text" class="form-control mb-4" placeholder="Search student">

    <div class="row" id="container">

<script>

const students = [

{name:"kothari",branch:"AI",cgpa:"9.1"},
{name:"ANKITA",branch:"CSE",cgpa:"8.9"},
{name:"ARPAN",branch:"ECE",cgpa:"8.5"},
{name:"vibha",branch:"IT",cgpa:"8.0"},
{name:"tanvi",branch:"AI",cgpa:"9.2"},
{name:"AYUSHi",branch:"CSE",cgpa:"8.7"},
{name:"swasti",branch:"ECE",cgpa:"8.1"},
{name:"tanish",branch:"IT",cgpa:"8.8"},
{name:"arnav",branch:"AI",cgpa:"8.9"},
{name:"Anita",branch:"AI",cgpa:"8.1"}

];

let html="";

for(let i=0;i<students.length;i++){

html += `
<div class="col-md-4 mb-3">

<div class="card shadow">

<div class="card-body">

<h4>${students[i].name}</h4>

<button class="btn btn-primary btn-sm mt-2"
onclick="toggleDetails(this)">
Show Details
</button>

<div class="details mt-3" style="display:none">

<p><strong>Branch:</strong> ${students[i].branch}</p>

<p><strong>CGPA:</strong> ${students[i].cgpa}</p>

</div>

</div>

</div>

</div>
`;

}

document.getElementById("container").innerHTML = html;

function toggleDetails(button){

let details = button.nextElementSibling;

if(details.style.display==="none"){

details.style.display="block";
button.innerHTML="Hide Details";

}else{

details.style.display="none";
button.innerHTML="Show Details";

};
}
</script>

</body>
</html>
